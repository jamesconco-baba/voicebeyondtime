<div style="background-color:#F7F1E6;padding:40px 20px;font-family:Georgia,'Times New Roman',serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:440px;margin:0 auto;">
    <tr>
      <td style="text-align:center;padding-bottom:28px;">
        <span style="font-family:Georgia,serif;font-size:22px;letter-spacing:0.02em;color:#20302E;">Amber</span>
      </td>
    </tr>
    <tr>
      <td style="background-color:#FFFFFF;border-radius:16px;padding:36px 32px;text-align:center;">
        <p style="margin:0 0 6px;font-family:Arial,sans-serif;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#A9573F;">
          Your sign-in code
        </p>
        <p style="margin:0 0 24px;font-family:Georgia,serif;font-size:19px;line-height:1.5;color:#20302E;">
          Enter this code to continue to Amber
        </p>
        <div style="display:inline-block;background-color:#F7F1E6;border-radius:12px;padding:16px 28px;margin-bottom:24px;">
          <span style="font-family:'Courier New',monospace;font-size:32px;letter-spacing:0.3em;color:#20302E;font-weight:bold;">
            {{ .Token }}
          </span>
        </div>
        <p style="margin:0;font-family:Arial,sans-serif;font-size:13px;line-height:1.6;color:#20302E99;">
          This code is valid for the next hour. If you didn't request it, you can safely ignore this email.
        </p>
      </td>
    </tr>
    <tr>
      <td style="text-align:center;padding-top:24px;">
        <p style="margin:0;font-family:Arial,sans-serif;font-size:12px;color:#6B7A6E;">
          A place for what matters most.
        </p>
      </td>
    </tr>
  </table>
</div>
